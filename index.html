<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>找文字</title>
    <style>
        #foundList {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .charBox {
            width: 50px;
            height: 50px;
            border: 3px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            background: #f9f9f9;
            border-radius: 4px;
        }
        .charBox.found {
            color: green;
            border-color: green;
            background: #e8ffe8;
        }
    </style>
</head>
<body>

    <h2 id="levelTitle">第1关</h2>
    <p>找出 <span id="wordCount" style="color:red;font-weight:bold;">3</span> 个常用字</p>
    <p>已找到：</p>
    <div id="foundList"></div>
    <div id="keywordDisplay" style="font-size:120px;text-align:center;margin:20px 0;">千</div>
    <input type="text" id="wordInput" placeholder="输入找到的文字" maxlength="1">
    <button id="submitBtn" onclick="submitWord()">提交</button>
    <p id="message"></p>

<script>
    // ==================== 关卡配置表 ====================
    let levels = [
        { keyword: "千", count: 3,  words: ["一","十","千"] },
        { keyword: "田", count: 7,  words: ["一","十","口","日","二","土","田"] },
        { keyword: "羊", count: 8,  words: ["一","二","三","干","羊","兰","十","丫"] },
        { keyword: "灰", count: 8,  words: ["一","人","大","灭","认","诙","火","灰"] },
        { keyword: "单", count: 12, words: ["一","二","三","十","口","日","丰","旦","兰","田","单","丫"] }
    ];
    // =====================================================

    let currentLevel = 0;
    let foundWords = [];

    loadLevel(currentLevel);

    function loadLevel(index) {
        let level = levels[index];
        foundWords = [];

        document.getElementById("levelTitle").innerText = "第" + (index + 1) + "关";
        document.getElementById("wordCount").innerText = level.count;

        let container = document.getElementById("foundList");
        container.innerHTML = "";
        for (let i = 0; i < level.count; i++) {
            let box = document.createElement("span");
            box.className = "charBox";
            box.innerText = "";
            container.appendChild(box);
        }

        document.getElementById("keywordDisplay").innerText = level.keyword;
        document.getElementById("wordInput").value = "";
        document.getElementById("message").innerText = "";
        document.getElementById("message").style.color = "red";
        document.getElementById("submitBtn").disabled = false;
    }

    function submitWord() {
        let input = document.getElementById("wordInput").value.trim();
        let level = levels[currentLevel];
        let msg = document.getElementById("message");

        if (input.length !== 1) {
            msg.style.color = "red";
            msg.innerText = "请输入单个汉字";
            return;
        }

        if (foundWords.includes(input)) {
            msg.style.color = "red";
            msg.innerText = "已找到该文字";
            return;
        }

        if (!level.words.includes(input)) {
            msg.style.color = "red";
            msg.innerText = "不是正确的文字";
            return;
        }

        // 答对了
        foundWords.push(input);
        msg.style.color = "green";
        msg.innerText = "恭喜你，找到正确的文字“" + input + "”";
        document.getElementById("wordInput").value = "";
        updateFoundList();

        // 全部找齐 — 先显示方块再弹窗
        if (foundWords.length === level.count) {
            document.getElementById("submitBtn").disabled = true;

            if (currentLevel === levels.length - 1) {
                setTimeout(function() {
                    alert("恭喜，已通关全部关卡！\n新关卡增加中……");
                    currentLevel = 0;
                    loadLevel(currentLevel);
                }, 300);
            } else {
                setTimeout(function() {
                    alert("恭喜通关！");
                    currentLevel++;
                    loadLevel(currentLevel);
                }, 300);
            }
        }
    }

    function updateFoundList() {
        let level = levels[currentLevel];
        let boxes = document.getElementById("foundList").children;

        for (let i = 0; i < level.count; i++) {
            if (i < foundWords.length) {
                boxes[i].innerText = foundWords[i];
                boxes[i].classList.add("found");
            } else {
                boxes[i].innerText = "";
                boxes[i].classList.remove("found");
            }
        }
    }
</script>
</body>
</html>
