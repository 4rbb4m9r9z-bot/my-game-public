<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猜数字工坊</title>
</head>
<script>
    // 1. 电脑先想好一个秘密数字
    let secretNumber = Math.floor(Math.random() * 100) + 1;
    console.log("嘘~ 秘密数字是：" + secretNumber); // 作弊用，按F12能看到

    // 2. 当玩家点击按钮时，运行这个检查逻辑
    function checkGuess() {
        // 拿到玩家输入的数字
        let guess = document.getElementById("guessInput").value;
        
        // 对比
        if (guess == secretNumber) {
            document.getElementById("message").innerHTML = "恭喜！你猜对了！";
            // 拿到当前次数，转成数字，加1
let currentCount = parseInt(document.getElementById("winCount").innerText);
document.getElementById("winCount").innerText = currentCount + 1;
document.getElementById("restartBtn").style.display = "inline-block";
        } else if (guess < secretNumber) {
            document.getElementById("message").innerHTML = "太小了，再大一点";
        } else {
            document.getElementById("message").innerHTML = "太大了，再小一点";
        }
    }
    function restartGame() {
    // 重新想一个秘密数字
    secretNumber = Math.floor(Math.random() * 100) + 1;
    console.log("嘘~ 新数字是：" + secretNumber);
    // 清空提示
    document.getElementById("message").innerHTML = "";
    // 清空输入框
    document.getElementById("guessInput").value = "";
    // 隐藏再来一次按钮
    document.getElementById("restartBtn").style.display = "none";
}
</script>
<body>
    html
<h1>猜数字游戏</h1>
<p>我心里想了一个 1 到 100 之间的数字，你猜猜看？</p>
<input type="number" id="guessInput" placeholder="输入你的数字">
<button onclick="checkGuess()">猜！</button>
<p id="message"></p>
<p>猜对次数：<span id="winCount">0</span></p>
<button id="restartBtn" style="display:none;" onclick="restartGame()">再来一次</button>
</body>
</html>
